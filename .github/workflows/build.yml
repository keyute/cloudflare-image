name: Build
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
permissions: {}
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm run build
